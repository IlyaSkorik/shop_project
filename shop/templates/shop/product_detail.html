<h1>{{ product.name }}</h1>

<img src="{{ product.product_image.url }}" width="300">

<p>{{ product.description }}</p>
<p>Цена: {{ product.price }} BYN</p>
<p>В наличии: {{ product.stock_quantity }}</p>

{% if user.is_authenticated %}
    <a href="{% url 'add_to_cart' product.id %}">Добавить в корзину</a>
{% endif %}
